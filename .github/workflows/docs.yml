name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ssciwr/doxygen-install@v2
        with:
          version: "1.9.8"   # pin whichever version you need, or omit for latest

      - name: Generate docs
        run: doxygen Doxyfile

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./doxygen-output/html

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
